<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Phishing Checker</title>
</head>
<body>
    <h2>Phishing / Scam Message Checker</h2>

    <textarea id="message" rows="8" cols="60" placeholder="Paste message here"></textarea>
    <br><br>
    <button onclick="checkMessage()">Analyze</button>

    <p id="result"></p>

    <script>
        async function checkMessage() {
            const message = document.getElementById("message").value;

            const response = await fetch("https://demo-ljmd.onrender.com", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            document.getElementById("result").innerText = data.result;
        }
    </script>
</body>
</html>
